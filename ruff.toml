# Конфиг линтера Ruff (статический анализ). Запуск: `ruff check bot`.
# Фокус — реальные баги, а не стиль. Кириллический «ambiguous unicode» шум
# (RUF001/2/3) отключён: проект русскоязычный, латиноподобные буквы — норма.

target-version = "py312"
line-length = 100

[lint]
# Только детекторы РЕАЛЬНЫХ багов (не стиль): чтобы `ruff check` давал сигнал,
# а не шум. F821 (необъявленное имя) здесь и поймал реальную опечатку.
select = [
    "F",      # pyflakes — необъявленные имена, неиспользуемое, f-string-баги
    "E9",     # синтаксис/отступы (критично)
    "B",      # flake8-bugbear — вероятные баги (closure-over-loop, мутабельные дефолты)
    "ASYNC",  # ошибки async (блокирующие вызовы в корутинах и т.п.)
    "PLE",    # pylint errors
    "RUF",    # ruff-специфичные реальные проблемы
]
ignore = [
    "RUF001", "RUF002", "RUF003",  # ambiguous-unicode: ложно на кириллице
    "RUF100",  # «unused noqa» — наши `# noqa: BLE001` валидны под строгий конфиг
    "RUF005",  # литеральная конкатенация — стиль, не баг
    "RUF046",  # лишний int() — косметика
    "B008",    # вызов в дефолте аргумента — у нас намеренно (фабрики)
]

[lint.per-file-ignores]
"scripts/*" = ["F841", "E402"]  # аудит-скрипты: допускаем вольности
