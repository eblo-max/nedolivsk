<style>

  .sh-h .stars{color:#f0cf7a;font-size:14px;letter-spacing:1px;text-shadow:0 0 7px #e7bf6388}
  .sh-h .slot{font-family:var(--hand);font-style:italic;color:var(--dim);font-size:13px;margin-top:3px}
  .sh-desc{font-family:var(--hand);font-style:italic;color:#b6a784;font-size:13.5px;line-height:1.4;margin:11px 2px}
  /* лесенка ярусов */
  .tiers{display:flex;gap:6px;margin:10px 0}
  .tiers .t{flex:1;text-align:center;font-family:var(--disp);font-size:11px;font-weight:700;letter-spacing:1px;
    color:#8a7a59;padding:7px 2px;border-radius:7px;background:#1c1206;border:1px solid var(--line);line-height:1.3}
  .tiers .t b{display:block;color:#caa15a;font-size:13px;margin-bottom:2px}
  .tiers .t.have{color:#ecdcb6;border-color:var(--line2);background:linear-gradient(#39280f,#241808)}
  .tiers .t.have b{color:#f0cf7a}
  .tiers .t.next{color:#241501;border-color:#f6dd92;background:linear-gradient(#f6d885,#cf9a3c 55%,#e7bf63)}
  .tiers .t.next b{color:#3a2406}
  .blk{margin-top:13px}
  .blk .h{font-family:var(--disp);font-weight:700;font-size:11px;letter-spacing:2.5px;color:#caa15a;margin-bottom:7px}
  .chips{display:flex;flex-wrap:wrap;gap:6px}
  .chip{font-family:var(--num);font-weight:700;font-size:12.5px;color:#e2d4b2;
    background:linear-gradient(#33240f,#1d1207);border:1px solid var(--line2);border-radius:6px;padding:4px 9px;
    box-shadow:inset 0 1px 0 #ffffff10}
  .cost .r{display:flex;align-items:center;justify-content:space-between;padding:6px 2px;border-top:1px solid #ffffff08;

  .cost .r:first-child{border-top:none}
  .cost .r .nm{display:flex;align-items:center;gap:8px;font-weight:500;color:#dccaa6}
  .cost .r .nm b{font-size:16px}
  .cost .r .amt{font-weight:700;font-variant-numeric:tabular-nums}
  .cost .r .amt.ok{color:#86c98a} .cost .r .amt.no{color:#d8694e}
  .meta{display:flex;justify-content:space-between;align-items:center;margin-top:12px;

  /* баннер состояния ковки */
  .cbar{display:flex;align-items:center;gap:12px;padding:12px 15px;border-radius:10px;

  .cbar.ready{border-color:#caa15a;box-shadow:0 0 16px #c0904c44,0 6px 18px #0008}
  .cbar .cic{font-size:26px;filter:drop-shadow(0 2px 3px #000)}
  .cbar.active .cic{animation:hammer 1.1s ease-in-out infinite;transform-origin:70% 70%}

  .cbar .ct{flex:1;min-width:0}

    border:1px solid #f6dd92;border-radius:8px;padding:11px 15px;cursor:pointer;flex:0 0 auto;
    background:linear-gradient(#f6d885,#cf9a3c 55%,#e7bf63);box-shadow:0 0 14px #e7bf6355,inset 0 1px 0 #fff8}
  .cbar .claim:active{transform:translateY(1px)}
  .dropnote{margin-top:13px;font-family:var(--hand);font-style:italic;text-align:center;color:#caa15a;
    font-size:13.5px;line-height:1.4;background:#2a1c0c66;border:1px dashed #7a5a2a;border-radius:9px;padding:11px}
  .toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%) translateY(14px);z-index:80;
    font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.5px;color:#241501;
    background:linear-gradient(#f6d885,#cf9a3c);border:1px solid #f6dd92;border-radius:9px;padding:11px 18px;
    box-shadow:0 8px 24px #000a;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none}

</style></head>

const BOSS=[
 {id:'rat_crown',sp:'rat_crown',nm:'Корона Крысиного Короля',slot:'Голова',boss:'🐀 Крысиный Король',

 {id:'troll_hide',sp:'troll_hide',nm:'Шкура болотного тролля',slot:'Грудь',boss:'👹 Болотный Тролль',

  d:'Не берёт ни клинок, ни топор, ни косой взгляд кредитора.',income:6,armor:35},

/* ── состояние: серверное (/api/forge), с fallback на образец для оффлайн-превью ── */
let CAT_CRAFT=CRAFT, CAT_BOSS=BOSS, CRAFTST={state:'none'};
let PURSE={gold:2400,wood:60,grain:80,hops:70,ingot:14,hide:6,fang:5,sinew:4,ring:1,pelt:4};
let OWNED={leather_cap:1,kovsh:2,rat_tail:2};   // образец для оффлайн-превью

const $=id=>document.getElementById(id);
const bonusList=(it,t)=>{const b=[];
  if(it.income)b.push('+'+it.income*t+'% доход'); if(it.yield)b.push('+'+it.yield*t+'% добыча');
  if(it.ywood)b.push('+'+it.ywood*t+'% 🪵'); if(it.speed)b.push('−'+it.speed*t+'% время вылазки');
  if(it.pay)b.push('−'+it.pay*t+'% плата'); if(it.dmg)b.push('⚔ '+it.dmg*t);
  if(it.crit)b.push('💥 '+it.crit*t+'%'); if(it.armor)b.push('🛡 '+it.armor*t); if(it.luck)b.push('🍀 '+it.luck*t);
  return b;};

function purseRow(){
  const order=['gold','wood','grain','hops','ingot'];
  $('purse').innerHTML=order.map(k=>{const[e,]=RES[k];const v=PURSE[k]||0;
    return `<div class="coin${k==='gold'?' g':''}"><b>${e}</b>${v}</div>`}).join('');
}
function card(it){
  const t=OWNED[it.id]||0;
  const mini=bonusList(it,t||1).slice(0,2).map(x=>`<span>${x}</span>`).join('');
  return `<div class="card${it.boss?' boss':''}" onclick="openSheet('${it.id}')">
    ${it.boss?'<div class="lock">🔒</div>':''}
    ${t?`<div class="stars">${STARS[t]}</div>`:''}
    <div class="thumb"><img src="assets/items/${it.sp}.png" alt="" loading="lazy"></div>
    <div class="nm">${it.nm}</div><div class="slot">${it.slot}</div>
    <div class="mini">${mini}</div></div>`;
}
function grids(){
  $('gridCraft').innerHTML=CAT_CRAFT.map(card).join('');
  $('gridBoss').innerHTML=CAT_BOSS.map(card).join('');
}

function openSheet(id){
  hap('light');
  const it=CAT_CRAFT.find(x=>x.id===id)||CAT_BOSS.find(x=>x.id===id);
  const cur=OWNED[id]||0;
  let html=`<div class="sh-top">
    <div class="sh-thumb"><img src="assets/items/${it.sp}.png" alt=""></div>
    <div class="sh-h"><div class="nm">${it.nm} ${cur?`<span class="stars">${STARS[cur]}</span>`:''}</div>
      <div class="slot">слот: ${it.slot}${it.region?` · ${it.region}`:''}${it.boss?` · ${it.boss}`:''}</div></div>
  </div>
  <div class="sh-desc">«${it.d}»</div>`;

  if(it.boss){                       // трофей босса — не куётся
    const t=cur||1;
    html+=`<div class="blk"><div class="h">ДАЁТ ${STARS[t]}</div>
      <div class="chips">${bonusList(it,t).map(x=>`<span class="chip">${x}</span>`).join('')}</div></div>
      <div class="dropnote">🏆 Трофей с босса — в кузнице не куётся.<br>Старший ярус выбивается только дропом.</div>
      <div class="sh-btns"><button onclick="closeSheet()">Закрыть</button></div>`;
  } else {
    const next=Math.min(cur+1,TMAX), maxed=cur>=TMAX;
    // лесенка ярусов
    let tiers='';
    for(let t=1;t<=TMAX;t++){const cls=t<=cur?'have':(t===next&&!maxed?'next':'');
      tiers+=`<div class="t ${cls}"><b>${STARS[t]}</b>${NAMES[t]}</div>`;}
    html+=`<div class="tiers">${tiers}</div>`;
    const showT=maxed?TMAX:next;
    html+=`<div class="blk"><div class="h">${maxed?'ДАЁТ':(cur?'БУДЕТ ДАВАТЬ':'ДАЁТ')} ${STARS[showT]}</div>
      <div class="chips">${bonusList(it,showT).map(x=>`<span class="chip">${x}</span>`).join('')}</div></div>`;
    if(maxed){
      html+=`<div class="dropnote">Мастерская работа. Лучше уже не выкуют — даже не проси.</div>
        <div class="sh-btns"><button onclick="closeSheet()">Закрыть</button></div>`;
    } else {
      const mult=CMULT[next], hrs=it.h*next; let afford=true;
      const rows=Object.entries(it.cost).map(([k,base])=>{const need=base*mult,have=PURSE[k]||0,ok=have>=need;
        if(!ok)afford=false; const[e,n]=RES[k]||['•',k];
        return `<div class="r"><div class="nm"><b>${e}</b>${n}</div><div class="amt ${ok?'ok':'no'}">${have} / ${need}</div></div>`}).join('');
      const busy=CRAFTST.state!=='none';
      const hint=busy?`<div class="dropnote">⚒ Мастер занят — ${CRAFTST.state==='ready'?'сперва забери готовую вещь':'идёт другой заказ'}.<br>Один заказ за раз.</div>`
                :(!afford?`<div class="dropnote">Не хватает ресурсов на этот ярус.</div>`:'');
      html+=`<div class="blk"><div class="h">ЦЕНА${cur?` · ПЕРЕКОВКА ${STARS[cur]}→${STARS[next]}`:''}</div>
        <div class="cost">${rows}</div></div>
        <div class="meta"><span>Ковка ${NAMES[next]} яруса</span><span class="hrs">⏳ ${hrs} ч</span></div>${hint}
        <div class="sh-btns"><button onclick="closeSheet()">Закрыть</button>
          <button class="go" ${(afford&&!busy)?'':'disabled'} onclick="order('${it.id}')">⚒ ${cur?'Перековать':'Заказать'}</button></div>`;
    }
  }
  $('sheetBody').innerHTML=html;
  $('sheet').classList.add('on');
}
function closeSheet(){$('sheet').classList.remove('on');}

/* ── баннер состояния ковки ── */
function renderBanner(){
  const el=$('craftBanner'), c=CRAFTST;
  if(!c||c.state==='none'){el.innerHTML='';return;}
  if(c.state==='active'){
    el.innerHTML=`<div class="cbar active"><div class="cic">🔨</div>
      <div class="ct"><div class="t1">Мастер кует: ${c.name} ${STARS[c.tier]||''}</div>
        <div class="t2">осталось ~${c.minutes} мин · один заказ за раз</div></div></div>`;
  } else {
    el.innerHTML=`<div class="cbar ready"><div class="cic">🎁</div>
      <div class="ct"><div class="t1">${c.name} ${STARS[c.tier]||''} — готова!</div>
        <div class="t2">мастер ждёт, забирай</div></div>
      <button class="claim" onclick="claim()">Забрать</button></div>`;
  }
}
function render(){purseRow();grids();renderBanner();}
function applyState(s){
  if(!s)return;
  if(s.craftCat)CAT_CRAFT=s.craftCat; if(s.bossCat)CAT_BOSS=s.bossCat;
  OWNED=s.owned||{}; CRAFTST=s.craft||{state:'none'};
  PURSE=Object.assign({gold:s.gold||0}, s.res||{});
  render();
}
async function loadForge(){
  try{
    const ctrl=new AbortController(), to=setTimeout(()=>ctrl.abort(),4500);
    const r=await fetch('/api/forge',{method:'POST',signal:ctrl.signal,
      headers:{'Content-Type':'application/json'},body:JSON.stringify({initData:tg?.initData||''})});
    clearTimeout(to);
    const d=await r.json(); if(d&&d.ok){applyState(d);return;}
  }catch(e){}                 // оффлайн-превью → остаётся образец
  render();
}
async function order(id){
  hap('medium');
  try{
    const r=await fetch('/api/forge/order',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({initData:tg?.initData||'',item_id:id})});
    const d=await r.json();
    if(d.state)applyState(d.state);
    if(d.ok){closeSheet();toast('Мастер взялся за дело!');}
    else{const m={busy:'Мастер занят — один заказ за раз',not_enough:'Не хватает ресурсов',
      max_tier:'Лучше уже не выкуют',unknown:'Это не куётся',auth:'Открой из бота',no_tavern:'Сначала заведи кабак'};
      toast(m[d.error]||'Не вышло');}
  }catch(e){toast('Нет связи с кузницей');}
}
async function claim(){
  hap('medium');
  try{
    const r=await fetch('/api/forge/claim',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({initData:tg?.initData||''})});
    const d=await r.json();
    if(d.state)applyState(d.state);
    if(d.ok){toast((d.item?.name||'Вещь')+' '+(d.item?.stars||'')+' — твоё!');}
    else{toast(d.error==='not_ready'?'Ещё куётся':'Нечего забирать');}
  }catch(e){toast('Нет связи с кузницей');}
}
let toastT;
function toast(msg){const el=$('toast');el.textContent=msg;el.classList.add('on');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('on'),2200);}

/* угли-искры на фоне */
const cv=$('fx'),x=cv.getContext('2d');let W,H,ps=[];
function rs(){W=cv.width=innerWidth*devicePixelRatio;H=cv.height=innerHeight*devicePixelRatio;}
rs();addEventListener('resize',rs);
for(let i=0;i<24;i++)ps.push({x:Math.random()*1,y:Math.random(),s:.3+Math.random()*.6,r:.6+Math.random()*1.4,a:.2+Math.random()*.5});
function tk(){x.clearRect(0,0,W,H);for(const p of ps){p.y-=p.s/H*devicePixelRatio*60*.016;if(p.y<-.02){p.y=1.02;p.x=Math.random();}
  x.beginPath();x.arc(p.x*W,p.y*H,p.r*devicePixelRatio,0,7);
  x.fillStyle='rgba(235,165,75,'+p.a+')';x.shadowColor='#eba54b';x.shadowBlur=6;x.fill();}requestAnimationFrame(tk);}
requestAnimationFrame(tk);

render();loadForge();
</script>
